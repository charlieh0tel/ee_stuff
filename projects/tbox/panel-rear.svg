<svg xmlns="http://www.w3.org/2000/svg" viewBox="-15 -18 330 122" width="990" height="366">
  <title>TBox rear panel — 300 x 79 mm, to scale, VIEWED FROM REAR (CH A on right)</title>
  <style>
    .panel  { fill: #ececec; stroke: #222; stroke-width: 1; }
    .grp    { fill: none; stroke: #888; stroke-width: 0.5; }
    .gt     { font-size: 4.5px; font-weight: bold; text-anchor: middle; fill: #333; }
    .gtbg   { fill: #ececec; }
    .nut    { fill: #cfcfcf; stroke: #444; stroke-width: 0.5; }
    .bush   { fill: #e5e5e5; stroke: #444; stroke-width: 0.4; }
    .hole   { fill: #222; }
    .de9    { fill: #d5d5d5; stroke: #333; stroke-width: 0.6; }
    .pin    { fill: #666; }
    .ppP    { fill: #c0392b; stroke: #333; stroke-width: 0.5; }
    .ppN    { fill: #3a3a3a; stroke: #333; stroke-width: 0.5; }
    .trim   { fill: #dedede; stroke: #444; stroke-width: 0.5; }
    .slot   { fill: #555; }
    .bat    { fill: #777; stroke: #333; stroke-width: 0.4; }
    text    { font-family: sans-serif; fill: #222; }
    .lbl    { font-size: 4px; text-anchor: middle; }
    .pos    { font-size: 3.2px; text-anchor: middle; fill: #444; }
    .dim    { font-size: 4px; fill: #777; }
    .dimln  { stroke: #999; stroke-width: 0.3; }
    .wht    { font-size: 6px; font-weight: bold; text-anchor: middle; fill: #fff; }
  </style>

  <defs>
    <!-- 1/4" jack: hex nut + bushing + hole -->
    <g id="j14">
      <polygon class="nut" points="9.5,0 4.75,8.23 -4.75,8.23 -9.5,0 -4.75,-8.23 4.75,-8.23"/>
      <circle class="bush" r="6.5"/>
      <circle class="hole" r="3.2"/>
    </g>
    <!-- 3.5mm jack -->
    <g id="j35">
      <polygon class="nut" points="6,0 3,5.2 -3,5.2 -6,0 -3,-5.2 3,-5.2"/>
      <circle class="bush" r="4"/>
      <circle class="hole" r="1.8"/>
    </g>
    <!-- screwdriver trim -->
    <g id="trim">
      <circle class="trim" r="4.2"/>
      <rect class="slot" x="-3" y="-0.9" width="6" height="1.8" rx="0.5"/>
    </g>
    <!-- toggle, bat up -->
    <g id="tog">
      <polygon class="nut" points="5,0 2.5,4.33 -2.5,4.33 -5,0 -2.5,-4.33 2.5,-4.33"/>
      <circle class="bush" r="3.2"/>
      <rect class="bat" x="-1.4" y="-9" width="2.8" height="9" rx="1.4"/>
    </g>
  </defs>

  <!-- panel outline -->
  <rect class="panel" x="0" y="0" width="300" height="79" rx="2"/>

  <!-- dimensions -->
  <line class="dimln" x1="0" y1="-13" x2="300" y2="-13"/>
  <text class="dim" x="140" y="-15">300 mm</text>
  <line class="dimln" x1="-8" y1="0" x2="-8" y2="79"/>
  <text class="dim" x="-11" y="48" transform="rotate(-90 -11 48)">79 mm</text>
  <text class="dim" x="92" y="98">VIEWED FROM REAR — CH A on right, CH B on left</text>

  <!-- ================= CHANNEL B (left) ================= -->
  <rect class="grp" x="6" y="10" width="60" height="66" rx="2"/>
  <rect class="gtbg" x="16" y="7.5" width="40" height="5"/>
  <text class="gt" x="36" y="12">CHANNEL B</text>

  <use href="#j14" x="21" y="30"/>
  <text class="lbl" x="21" y="18">PTT 1/4"</text>
  <use href="#j35" x="49" y="30"/>
  <text class="lbl" x="49" y="18">PTT 3.5</text>

  <text class="lbl" x="21" y="50">BIAS</text>
  <text class="pos" x="21" y="56">ON</text>
  <use href="#tog" x="21" y="67"/>
  <text class="pos" x="21" y="75">OFF</text>

  <text class="lbl" x="49" y="50">GAIN</text>
  <text class="pos" x="49" y="56">HI</text>
  <use href="#tog" x="49" y="67"/>
  <text class="pos" x="49" y="75">LO</text>

  <!-- ================= RIG (center) ================= -->
  <rect class="grp" x="74" y="10" width="112" height="66" rx="2"/>
  <rect class="gtbg" x="120" y="7.5" width="20" height="5"/>
  <text class="gt" x="130" y="12">RIG</text>

  <!-- DE-9 female, jackscrew holes -->
  <g transform="translate(106,29)">
    <rect class="de9" x="-16" y="-8" width="32" height="16" rx="3"/>
    <path d="M -12,-5 L 12,-5 L 10,5 L -10,5 Z" fill="#aaa" stroke="#555" stroke-width="0.4"/>
    <circle class="pin" cx="-8" cy="-2" r="0.9"/>
    <circle class="pin" cx="-4" cy="-2" r="0.9"/>
    <circle class="pin" cx="0"  cy="-2" r="0.9"/>
    <circle class="pin" cx="4"  cy="-2" r="0.9"/>
    <circle class="pin" cx="8"  cy="-2" r="0.9"/>
    <circle class="pin" cx="-6" cy="2.2" r="0.9"/>
    <circle class="pin" cx="-2" cy="2.2" r="0.9"/>
    <circle class="pin" cx="2"  cy="2.2" r="0.9"/>
    <circle class="pin" cx="6"  cy="2.2" r="0.9"/>
    <circle class="hole" cx="-20" cy="0" r="1.6"/>
    <circle class="hole" cx="20"  cy="0" r="1.6"/>
  </g>
  <text class="lbl" x="106" y="18">RIG  DE-9</text>

  <use href="#j35" x="152" y="29"/>
  <text class="lbl" x="152" y="18">LINE OUT</text>

  <!-- trims -->
  <use href="#trim" x="88"  y="62"/>
  <text class="lbl" x="88"  y="74">RX L</text>
  <use href="#trim" x="110" y="62"/>
  <text class="lbl" x="110" y="74">RX R</text>
  <use href="#trim" x="132" y="62"/>
  <text class="lbl" x="132" y="74">MIC</text>
  <use href="#trim" x="154" y="62"/>
  <text class="lbl" x="154" y="74">LINE TX</text>
  <use href="#trim" x="176" y="62"/>
  <text class="lbl" x="176" y="74">LINE RX</text>

  <!-- ================= POWER (center-right) ================= -->
  <rect class="grp" x="194" y="10" width="46" height="66" rx="2"/>
  <rect class="gtbg" x="203" y="7.5" width="28" height="5"/>
  <text class="gt" x="217" y="12">POWER</text>

  <g transform="translate(217,27)">
    <rect class="ppP" x="-16" y="-8" width="16" height="16" rx="1.5"/>
    <rect class="ppN" x="0"   y="-8" width="16" height="16" rx="1.5"/>
    <text class="wht" x="-8" y="2.2">+</text>
    <text class="wht" x="8"  y="2.2">−</text>
  </g>
  <text class="lbl" x="217" y="44">13.8 V</text>

  <g transform="translate(217,63)">
    <circle class="nut" r="4.5"/>
    <circle class="bush" r="2.8"/>
    <circle class="hole" r="1.3"/>
  </g>
  <text class="lbl" x="217" y="53">GND</text>

  <!-- ================= CHANNEL A (right) ================= -->
  <rect class="grp" x="234" y="10" width="60" height="66" rx="2"/>
  <rect class="gtbg" x="244" y="7.5" width="40" height="5"/>
  <text class="gt" x="264" y="12">CHANNEL A</text>

  <use href="#j35" x="251" y="30"/>
  <text class="lbl" x="251" y="18">PTT 3.5</text>
  <use href="#j14" x="279" y="30"/>
  <text class="lbl" x="279" y="18">PTT 1/4"</text>

  <text class="lbl" x="251" y="50">GAIN</text>
  <text class="pos" x="251" y="56">HI</text>
  <use href="#tog" x="251" y="67"/>
  <text class="pos" x="251" y="75">LO</text>

  <text class="lbl" x="279" y="50">BIAS</text>
  <text class="pos" x="279" y="56">ON</text>
  <use href="#tog" x="279" y="67"/>
  <text class="pos" x="279" y="75">OFF</text>
</svg>
