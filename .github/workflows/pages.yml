name: Build PDFs and Deploy to Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get install -y texlive-full
          pip install matplotlib numpy

      - name: Generate figures
        run: python3 make_regimes_figure.py
        working-directory: math/diode_small_signal

      - name: Build PDFs
        run: make
        working-directory: math/diode_small_signal

      - name: Assemble site
        run: |
          mkdir -p _site/math/diode_small_signal
          cp math/diode_small_signal/diode_smallsignal.pdf _site/math/diode_small_signal/
          cp math/diode_small_signal/diode_reactive.pdf _site/math/diode_small_signal/
          cat > _site/index.html <<'EOF'
          <!DOCTYPE html>
          <html lang="en">
          <head><meta charset="utf-8"><title>EE Notes</title>
          <style>body{font-family:sans-serif;max-width:600px;margin:2em auto}</style>
          </head>
          <body>
          <h1>EE Notes</h1>
          <ul>
            <li><a href="math/diode_small_signal/diode_smallsignal.pdf">Diode Small Signal Model Derivation</a></li>
            <li><a href="math/diode_small_signal/diode_reactive.pdf">Reactive Small-Signal: Nonlinear Junction Capacitance</a></li>
          </ul>
          </body>
          </html>
          EOF

      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - id: deploy
        uses: actions/deploy-pages@v4
